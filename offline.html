<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f4f4;
            color:#333;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0 4px 12px rgba(0,0,0,.2);
            text-align:center;
            max-width:500px;
        }

        h1{
            color:#8B0000;
        }

        p{
            line-height:1.6;
        }

    </style>

</head>

<body>

<div class="card">

<h1>You're Offline</h1>

<p>
It looks like you don't have an internet connection.
</p>

<p>
Please reconnect and try again.
</p>

</div>

</body>
</html>
